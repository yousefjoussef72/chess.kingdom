<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شطرنج المحترفين - أونلاين</title>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #1a1a1a; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        #board { width: 100%; max-width: 450px; margin: 20px auto; border: 5px solid #444; border-radius: 8px; }
        .status-box { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #555; }
        #invite-link { color: #00d4ff; font-size: 0.9em; word-break: break-all; cursor: pointer; }
        .game-info { font-weight: bold; color: #ffcc00; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>♟️ شطرنج التحدي الجبار</h1>
    
    <div class="status-box" id="room-section">
        <p>أرسل الرابط لصديقك لبدء التحدي:</p>
        <div id="invite-link">جاري توليد الرابط...</div>
    </div>

    <div id="board"></div>
    <div class="game-info" id="status">جاري الاتصال بالقاعدة...</div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script type="module" src="app.js"></script>

</body>
</html>
