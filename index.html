<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Chess</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            width: 400px;
            height: 400px;
            border: 2px solid black;
        }
        .square {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .white {
            background-color: white;
        }
        .black {
            background-color: gray;
        }
    </style>
</head>
<body>
    <h1>Multiplayer Chess Game</h1>
    <div id="board"></div>
    <input type="text" id="peerId" placeholder="Enter Peer ID...">
    <button id="connectBtn">Connect</button>
    
    <script src="https://cdn.rawgit.com/peers/peerjs/master/lib/peerjs.min.js"></script>
    <script>
        const board = document.getElementById('board');
        const connectBtn = document.getElementById('connectBtn');
        const peerIdInput = document.getElementById('peerId');

        const peer = new Peer();  // Create a peer instance

        peer.on('open', (id) => {
            console.log('My peer ID is: ' + id);
        });

        connectBtn.addEventListener('click', () => {
            const conn = peer.connect(peerIdInput.value);
            conn.on('open', () => {
                console.log('Connected to ' + peerIdInput.value);
            });
            conn.on('data', (data) => {
                console.log('Received data: ', data);
                // Handle game moves received from the other player
            });
        });

        function createBoard() {
            for (let row = 0; row < 8; row++) {
                for (let col = 0; col < 8; col++) {
                    const square = document.createElement('div');
                    square.className = (row + col) % 2 === 0 ? 'square white' : 'square black';
                    square.textContent = ''; // Placeholder for chess pieces
                    board.appendChild(square);
                }
            }
        }

        createBoard();

        // Additional game logic and piece handling to be added here

    </script>
</body>
</html>
